<script>
  /**
   * TRANSLATIONS
   */
  let TRANSLATIONS = {};

  function updateUI() {
    const lang = USER_LOCALE || 'en';
    google.script.run
      .withSuccessHandler(t => {
        TRANSLATIONS = t;
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          if (t[key]) {
            if (el.tagName === 'OPTION') {
              el.text = t[key];
            } else {
              el.textContent = t[key];
            }
          }
        });
      })
      .getI18n(lang);
  }

  /**
   * PICKER LOGIC
   */
  let selectedScriptId = null;
  let selectedScriptName = null;
  let pickerApiLoaded = false;

  document.addEventListener('DOMContentLoaded', function () {
    updateUI();
    initButtons();
    loadSavedKey();
    gapi.load('picker', { 'callback': () => { pickerApiLoaded = true; } });
  });

  function loadSavedKey() {
    google.script.run
      .withSuccessHandler(data => { 
        if (data.key) document.getElementById('gemini-key').value = data.key;
        if (data.template) document.getElementById('template-select').value = data.template;
      })
      .getSavedSettings();
  }

  function initButtons() {
    document.getElementById('pick-script-btn').addEventListener('click', showPicker);
    document.getElementById('generate-btn').addEventListener('click', generateDoc);
    document.getElementById('test-key-btn').addEventListener('click', testKey);
    document.getElementById('cancel-btn').addEventListener('click', () => google.script.host.close());
    document.getElementById('close-btn').addEventListener('click', () => google.script.host.close());
  }
  
  function testKey() {
    const key = document.getElementById('gemini-key').value;
    if (!key) return alert(TRANSLATIONS.labelGemini);
    
    const btn = document.getElementById('test-key-btn');
    btn.textContent = '...';
    
    google.script.run
      .withSuccessHandler(res => {
        btn.textContent = res ? '✅' : '❌';
        setTimeout(() => { btn.textContent = 'Test'; }, 3000);
      })
      .testGeminiKey(key);
  }

  function showPicker() {
    if (!pickerApiLoaded) {
      alert('Google Picker API not loaded yet. Please wait.');
      return;
    }
    google.script.run
      .withSuccessHandler(createPicker)
      .withFailureHandler(showError)
      .getOAuthToken();
  }

  function createPicker(token) {
    const view = new google.picker.View(google.picker.ViewId.DOCS);
    view.setMimeTypes('application/vnd.google-apps.script');

    const picker = new google.picker.PickerBuilder()
      .addView(view)
      .setOAuthToken(token)
      // Note: In some environments, an API Key is mandatory. 
      // If this fails, you may need to add .setDeveloperKey('YOUR_API_KEY')
      .setCallback(pickerCallback)
      .setOrigin(google.script.host.origin)
      .build();
    picker.setVisible(true);
  }

  function pickerCallback(data) {
    if (data.action === google.picker.Action.PICKED) {
      const doc = data.docs[0];
      selectedScriptId = doc.id;
      selectedScriptName = doc.name;

      const fileInfo = document.getElementById('file-name');
      fileInfo.textContent = selectedScriptName;
      fileInfo.removeAttribute('data-i18n'); // Stop translating once picked

      document.getElementById('selected-file-info').classList.remove('hidden');
      document.getElementById('generate-btn').disabled = false;
    }
  }

  /**
   * GENERATION LOGIC
   */
  function generateDoc() {
    if (!selectedScriptId) return showToast('Veuillez d\'abord sélectionner un script.', 'error');
    
    setLoading(true);
    const settings = {
      scriptId: selectedScriptId,
      template: document.getElementById('template-select').value,
      geminiKey: document.getElementById('gemini-key').value,
      locale: USER_LOCALE
    };

    google.script.run
      .withSuccessHandler(res => {
        setLoading(false);
        if (res.success) {
          document.getElementById('res-project-name').textContent = res.projectName;
          document.getElementById('res-template').textContent = settings.template;
          showStep('success');
        }
      })
      .withFailureHandler(err => {
        setLoading(false);
        showToast('Erreur : ' + err.message, 'error');
      })
      .generateDocumentation(settings);
  }

  function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast ' + type;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 5000);
  }

  function onGenerationSuccess(result) {
    document.getElementById('loading-overlay').classList.add('hidden');
    document.getElementById('config-step').classList.remove('active');
    document.getElementById('success-step').classList.add('active');

    document.getElementById('res-project-name').textContent = result.projectName;
    document.getElementById('res-template').textContent = result.template;
  }

  function showError(err) {
    document.getElementById('loading-overlay').classList.add('hidden');
    alert('Error: ' + (err.message || err));
  }
</script>
