<style>
:root {
  --primary-color: #1a73e8;
  --primary-hover: #1557b0;
  --secondary-color: #f1f3f4;
  --text-main: #202124;
  --text-secondary: #5f6368;
  --bg-color: #ffffff;
  --border-color: #dadce0;
  --success-color: #4caf50;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', sans-serif;
  color: var(--text-main);
  background: var(--bg-color);
  line-height: 1.5;
  font-size: 14px;
}

#app {
  padding: 24px;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  margin-bottom: 32px;
}

h1 {
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 4px;
}

.subtitle {
  color: var(--text-secondary);
  font-size: 13px;
}

section {
  margin-bottom: 32px;
}

.step-indicator {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
}

.step-indicator .number {
  width: 24px;
  height: 24px;
  background: var(--primary-color);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  margin-right: 12px;
}

.step-indicator .label {
  font-weight: 500;
  font-size: 14px;
}

.field {
  padding-left: 36px;
}

label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

select:focus {
  border-color: var(--primary-color);
}

.field-info {
  margin-top: 8px;
  font-style: italic;
  color: #70757a;
  font-size: 12px;
}

.secondary-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: calc(100% - 36px);
  margin-left: 36px;
  padding: 10px;
  background: var(--primary-color);
  color: white;
  border: none;
  border-radius: 4px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}

.secondary-btn:hover {
  background: var(--primary-hover);
}

.file-info {
  margin-top: 12px;
  margin-left: 36px;
  color: #70757a;
  font-size: 13px;
}

.hidden {
  display: none !important;
}

footer {
  margin-top: auto;
  display: flex;
  gap: 12px;
  padding-top: 24px;
  border-top: 1px solid var(--border-color);
}

.primary-btn {
  flex: 1;
  padding: 12px;
  background: #a0c3ff; /* Disabled look initially */
  color: white;
  border: none;
  border-radius: 4px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.primary-btn:not(:disabled) {
  background: var(--primary-color);
}

.primary-btn:not(:disabled):hover {
  background: var(--primary-hover);
}

.text-btn {
  padding: 12px 16px;
  background: transparent;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  color: var(--text-secondary);
  cursor: pointer;
}

/* Success Step */
.step {
  display: none;
}

.step.active {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.success-content {
  text-align: center;
  padding-top: 40px;
}

.success-icon {
  margin-bottom: 24px;
}

.success-content h2 {
  font-size: 20px;
  margin-bottom: 12px;
}

.success-content p {
  color: var(--text-secondary);
  font-size: 13px;
  margin-bottom: 32px;
}

.summary-card {
  background: #f8f9fa;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 32px;
  text-align: left;
}

.summary-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 13px;
}

.summary-item .label {
  color: var(--text-secondary);
}

.summary-item .value {
  font-weight: 500;
}

/* Loading Overlay */
.overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(255, 255, 255, 0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--secondary-color);
  border-top-color: var(--primary-color);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* MD3 Test Button */
.test-btn {
  padding: 8px 16px;
  background-color: #e8f0fe;
  color: #1967d2;
  border: 1px solid #d2e3fc;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 60px;
}

.test-btn:hover {
  background-color: #d2e3fc;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

.test-btn:active {
  background-color: #aecbfa;
  transform: scale(0.95);
}
/* MD3 Toast / Snackbar */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #322f35;
  color: #f5eff7;
  padding: 12px 24px;
  border-radius: 4px;
  font-size: 13px;
  z-index: 1000;
  box-shadow: 0 3px 5px rgba(0,0,0,0.2);
  min-width: 200px;
  text-align: center;
  animation: slideUp 0.3s ease;
}

.toast.error {
  background: #b3261e;
  color: white;
}

@keyframes slideUp {
  from { bottom: -50px; opacity: 0; }
  to { bottom: 24px; opacity: 1; }
}
</style>
